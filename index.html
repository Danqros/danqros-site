<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">

  <title>Danqroş</title>
  <link rel="stylesheet" href="style.css">

<body>

<h1>Danqroş Satış Sistemi</h1>

<div class="card">

<select id="productSelect"></select>

<ul id="salesList"></ul>

<h3>Kassa: <span id="cash">0</span> ₼</h3>
  <input id="name" placeholder="Məhsul adı">
  <input id="price" type="number" placeholder="Qiymət">
  <button onclick="addProduct()">Əlavə et</button>

  <ul id="list"></ul>
</div>

<script src="app.js"></script>

</body>
