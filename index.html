<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danqroş</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f4f6fb}
header{
background:#2563eb;
color:#fff;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}
.card{
background:#fff;
border-radius:16px;
padding:35px 20px;
text-align:center;
font-size:20px;
font-weight:bold;
box-shadow:0 8px 20px rgba(0,0,0,.08);
cursor:pointer;
transition:.2s;
}
.card:active{
transform:scale(.97);
}
</style>
</head>
<body>

<header>Danqroş</header>

<div class="grid">
<div class="card">📦 Məhsullar</div>
<div class="card">👤 Müştərilər</div>
<div class="card">🛒 Satış</div>
<div class="card">🛍️ Alış</div>
<div class="card">💰 Kassa</div>
</div>

</body>
</html>
