<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danqroş</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>DANQROŞ</h1>
</header>

<nav>
    <button onclick="showPage('products')">📦 Məhsullar</button>
    <button onclick="showPage('customers')">👤 Müştərilər</button>
    <button onclick="showPage('sales')">🛒 Satış</button>
    <button onclick="showPage('purchase')">🛍️ Alış</button>
    <button onclick="showPage('cash')">💰 Kassa</button>
</nav>

<main>

<section id="products" class="page">

<h2>Məhsullar</h2>

<input id="productName" placeholder="Məhsul adı">

<input id="buyPrice" type="number" placeholder="Alış qiyməti">

<input id="sellPrice" type="number" placeholder="Satış qiyməti">

<button onclick="addProduct()">Əlavə et</button>

<hr>

<div id="productList"></div>

</section>

<section id="customers" class="page" style="display:none;">
<h2>Müştərilər</h2>
<p>Hazırlanır...</p>
</section>

<section id="sales" class="page" style="display:none;">
<h2>Satış</h2>
<p>Hazırlanır...</p>
</section>

<section id="purchase" class="page" style="display:none;">
<h2>Alış</h2>
<p>Hazırlanır...</p>
</section>

<section id="cash" class="page" style="display:none;">
<h2>Kassa</h2>
<p>Hazırlanır...</p>
</section>

</main>

<script src="app.js"></script>

</body>
</html>
