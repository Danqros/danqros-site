<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danqroş</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <h2>Danqroş Giriş</h2>

  <input id="username" placeholder="İstifadəçi adı"><br><br>

  <input id="password" type="password" placeholder="Şifrə"><br><br>

  <button onclick="login()">Daxil ol</button>
</div>

<div id="panel" style="display:none;">
  <h2 id="welcome"></h2>

  <h3>Məhsul əlavə et</h3>

  <input id="productName" placeholder="Məhsul adı">
  <input id="productPrice" type="number" placeholder="Qiymət">

  <button onclick="addProduct()">Əlavə et</button>

  <h3>Məhsullar</h3>
  <ul id="productList"></ul>
</div>

<script src="app.js"></script>

</body>
</html>
